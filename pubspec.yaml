name: pantry_pal
description: Pantry Pal - Barcode grocery tracker with expiry reminders

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  isar: ^3.1.0+6
  isar_flutter_libs: ^3.1.0+6
  mobile_scanner: ^5.2.3
  http: ^1.2.2
  flutter_local_notifications: ^17.2.3
  provider: ^6.1.2
  intl: ^0.19.0
  uuid: ^4.5.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  isar_generator: ^3.1.0+6
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/
